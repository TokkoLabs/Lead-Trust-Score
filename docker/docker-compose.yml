services:
  # ── Lead Trust Copilot ─────────────────────────────────────────────────────
  # Demo local: docker-compose up
  # Requiere un archivo .env en la raíz del repo con ANTHROPIC_API_KEY.
  lead-trust-copilot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # ── Arnés R2D2 ────────────────────────────────────────────────────────────
  harness:
    build:
      context: ..
      dockerfile: docker/Dockerfile.harness
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  app:
    profiles:
      - product
    build:
      context: ..
      dockerfile: docker/Dockerfile.product
    working_dir: /workspace
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ..:/workspace

  test:
    profiles:
      - product
    build:
      context: ..
      dockerfile: docker/Dockerfile.product
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: ["./docker/scripts/run-product-tests.sh"]
